<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Orders Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #6366f1;

      --critical: #ef4444;
      --high: #f97316;
      --medium: #eab308;
      --low: #22c55e;
      --overdue: #ef4444;

      --status-open: #6366f1;
      --status-inprogress: #3b82f6;
      --status-closed: #475569;
      --status-pending: #a855f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    header h1 span { color: var(--accent); }
    #last-updated { color: var(--muted); font-size: 12px; }

    /* ── Counter row ── */
    .counters {
      display: flex;
      gap: 16px;
      padding: 20px 28px;
    }
    .counter {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .counter.overdue {
      border-color: var(--overdue);
      background: rgba(239, 68, 68, 0.07);
    }
    .counter-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }
    .counter.overdue .counter-label { color: var(--overdue); }
    .counter-value {
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
    }
    .counter.overdue .counter-value {
      color: var(--overdue);
      font-size: 52px;
    }
    .counter-sub { font-size: 12px; color: var(--muted); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 12px;
      padding: 0 28px 16px;
      align-items: center;
    }
    .filters label { font-size: 12px; color: var(--muted); font-weight: 600; }
    select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    #clear-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    #clear-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Table ── */
    .table-wrap {
      padding: 0 28px 28px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:hover { background: rgba(99, 102, 241, 0.06); }
    tbody tr.selected { background: rgba(99, 102, 241, 0.12); }
    tbody tr.is-overdue td:first-child::before {
      content: '⚠ ';
      color: var(--overdue);
    }
    td {
      padding: 11px 14px;
      vertical-align: middle;
    }
    .td-title { font-weight: 500; max-width: 240px; }
    .td-title .overdue-badge {
      display: inline-block;
      background: rgba(239,68,68,0.15);
      color: var(--overdue);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Priority badges */
    .priority {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .priority.CRITICAL { background: rgba(239,68,68,0.15); color: #ef4444; }
    .priority.HIGH     { background: rgba(249,115,22,0.15); color: #f97316; }
    .priority.MEDIUM   { background: rgba(234,179,8,0.15);  color: #eab308; }
    .priority.LOW      { background: rgba(34,197,94,0.15);  color: #22c55e; }

    /* Status badges */
    .status {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status.OPEN        { background: rgba(99,102,241,0.15); color: #818cf8; }
    .status.IN_PROGRESS { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .status.CLOSED      { background: rgba(71,85,105,0.25);  color: #94a3b8; }
    .status.PENDING     { background: rgba(168,85,247,0.15); color: #c084fc; }

    .td-due { white-space: nowrap; }
    .td-due.overdue { color: var(--overdue); font-weight: 600; }

    /* ── Detail Panel ── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      justify-content: flex-end;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      width: 420px;
      max-width: 95vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      height: 100%;
      overflow-y: auto;
      padding: 28px;
      position: relative;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    #close-panel {
      position: absolute;
      top: 20px; right: 20px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    #close-panel:hover { color: var(--text); }
    .panel-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      padding-right: 32px;
    }
    .panel-badges { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .detail-section {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 16px;
    }
    .detail-section h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .detail-row .dk { color: var(--muted); min-width: 90px; flex-shrink: 0; }
    .detail-row .dv { font-weight: 500; word-break: break-word; }
    .detail-row .dv.red { color: var(--overdue); }

    /* ── Empty / Error / Loading ── */
    .state-box {
      text-align: center;
      padding: 64px 28px;
      color: var(--muted);
    }
    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box p { font-size: 14px; }
    .state-box.error p { color: #f87171; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #count-row { font-size: 13px; color: var(--muted); padding: 0 28px 10px; }

    /* ── Signal badges & observations ── */
    .signal-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(20,184,166,0.15);
      color: #2dd4bf;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .obs-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .obs-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.4;
    }
    .obs-time { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .obs-form { display: flex; gap: 8px; margin-top: 12px; }
    .obs-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      min-width: 0;
    }
    .obs-input:focus { border-color: var(--accent); }
    .obs-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .obs-btn:hover { background: #4f52d9; }
    .obs-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .obs-error { font-size: 12px; color: #f87171; margin-top: 6px; min-height: 16px; }
  </style>
</head>
<body>

<header>
  <h1>Work Orders <span>Dashboard</span></h1>
  <span id="last-updated"></span>
</header>

<!-- Counter row -->
<div class="counters">
  <div class="counter overdue">
    <div class="counter-label">Overdue</div>
    <div class="counter-value" id="cnt-overdue">—</div>
    <div class="counter-sub">Past due &amp; not closed</div>
  </div>
  <div class="counter">
    <div class="counter-label">Open</div>
    <div class="counter-value" id="cnt-open">—</div>
    <div class="counter-sub">Needs action</div>
  </div>
  <div class="counter">
    <div class="counter-label">In Progress</div>
    <div class="counter-value" id="cnt-inprogress">—</div>
    <div class="counter-sub">Currently active</div>
  </div>
  <div class="counter">
    <div class="counter-label">Total</div>
    <div class="counter-value" id="cnt-total">—</div>
    <div class="counter-sub">This fetch (limit 25)</div>
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <div class="filter-group">
    <label for="filter-status">Status</label>
    <select id="filter-status">
      <option value="">All</option>
    </select>
  </div>
  <div class="filter-group">
    <label for="filter-priority">Priority</label>
    <select id="filter-priority">
      <option value="">All</option>
    </select>
  </div>
  <button id="clear-btn">Clear filters</button>
</div>

<div id="count-row"></div>

<!-- Table -->
<div class="table-wrap">
  <table id="wo-table">
    <thead>
      <tr>
        <th>Title</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Asset</th>
        <th>Severity</th>
        <th>Location</th>
        <th>Due Date</th>
      </tr>
    </thead>
    <tbody id="wo-tbody">
      <tr><td colspan="7">
        <div class="state-box">
          <div class="spinner"></div>
          <p>Loading work orders…</p>
        </div>
      </td></tr>
    </tbody>
  </table>
</div>

<!-- Detail panel overlay -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <button id="close-panel" title="Close">×</button>
    <div id="panel-content"></div>
  </div>
</div>

<script>
  const PRIORITY_SCORE = { CRITICAL: 4, HIGH: 3, MEDIUM: 2, LOW: 1 };

  let allOrders = [];  // normalized
  let selectedId = null;
  let allSignals = [];
  let signalsByWoId = {};

  function buildSignalMap() {
    signalsByWoId = {};
    allSignals.forEach(s => {
      (signalsByWoId[s.workOrderId] ??= []).push(s);
    });
  }

  async function loadSignals() {
    try {
      const res = await fetch('/api/signals');
      if (!res.ok) return;
      allSignals = await res.json();
      buildSignalMap();
    } catch (_) { /* non-critical */ }
  }

  // ── Normalizer — maps raw API shape to stable UI fields ───
  //   endDate             → dueDate  (API uses endDate, not dueDate)
  //   workOrderStage.name → status
  //   executionPriority   → priority
  //   workOrderAssets[0]  → assetName / assetDescription (plain list, no nodes wrapper)

  function normalizeWorkOrder(raw) {
    const firstAsset = raw.workOrderAssets?.[0]?.asset ?? null;
    return {
      id:               raw.id,
      title:            raw.title,
      description:      raw.description,
      severity:         raw.severity ?? '',
      status:           raw.workOrderStage?.name ?? '',
      priority:         raw.executionPriority ?? '',
      dueDate:          raw.endDate ? new Date(Number(raw.endDate)) : null,
      locationName:     raw.location?.locationName ?? '',
      locationAddress:  raw.location?.address ?? '',
      assetName:        firstAsset?.name ?? '',
      assetDescription: firstAsset?.description ?? '',
      assetId:          firstAsset?.id ?? '',
    };
  }

  // ── Helpers ──────────────────────────────────────────────

  function isClosedStatus(status) {
    return /complete|closed|resolved|done|cancelled/i.test(status || '');
  }

  function isOverdue(wo) {
    if (!wo.dueDate) return false;
    if (isClosedStatus(wo.status)) return false;
    return wo.dueDate < new Date();
  }

  function normalise(str) {
    return (str || '').toUpperCase().replace(/[\s-]/g, '_');
  }

  // Maps any real stage name string to one of the four CSS badge classes
  function statusClass(status) {
    const n = normalise(status);
    if (/^TO_DO$|^OPEN$|^NEW$|^NOT_STARTED$/.test(n)) return 'OPEN';
    if (/IN_PROGRESS|ACTIVE|WORKING/.test(n))          return 'IN_PROGRESS';
    if (/COMPLETE|CLOSED|RESOLVED|DONE|CANCEL/.test(n)) return 'CLOSED';
    return 'PENDING';
  }

  function fmtDate(d) {
    if (!d) return '—';
    if (isNaN(d)) return '—';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function priorityScore(wo) {
    return PRIORITY_SCORE[normalise(wo.priority)] || 0;
  }

  function sortOrders(orders) {
    return [...orders].sort((a, b) => {
      const aO = isOverdue(a) ? 1 : 0;
      const bO = isOverdue(b) ? 1 : 0;
      if (bO !== aO) return bO - aO;
      const ps = priorityScore(b) - priorityScore(a);
      if (ps !== 0) return ps;
      if (a.dueDate && b.dueDate) return a.dueDate - b.dueDate;
      return 0;
    });
  }

  // ── Counters ──────────────────────────────────────────────

  function updateCounters(orders) {
    document.getElementById('cnt-overdue').textContent =
      orders.filter(isOverdue).length;
    document.getElementById('cnt-open').textContent =
      orders.filter(w => /^to\s*do$|^open$|^new$|^not\s*started$/i.test(w.status)).length;
    document.getElementById('cnt-inprogress').textContent =
      orders.filter(w => /in\s*progress|in\s*work|active/i.test(w.status)).length;
    document.getElementById('cnt-total').textContent = orders.length;
  }

  // ── Filters ──────────────────────────────────────────────

  function populateFilters(orders) {
    const statuses   = [...new Set(orders.map(w => w.status).filter(Boolean))];
    const priorities = [...new Set(orders.map(w => w.priority).filter(Boolean))];

    const sSel = document.getElementById('filter-status');
    const pSel = document.getElementById('filter-priority');

    statuses.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      sSel.appendChild(o);
    });
    priorities.forEach(p => {
      const o = document.createElement('option');
      o.value = p; o.textContent = p;
      pSel.appendChild(o);
    });
  }

  function getFiltered() {
    const status   = document.getElementById('filter-status').value;
    const priority = document.getElementById('filter-priority').value;
    return allOrders.filter(w => {
      if (status   && w.status   !== status)   return false;
      if (priority && w.priority !== priority) return false;
      return true;
    });
  }

  // ── Table ─────────────────────────────────────────────────

  function renderTable() {
    const filtered = sortOrders(getFiltered());
    const tbody    = document.getElementById('wo-tbody');
    const countRow = document.getElementById('count-row');

    countRow.textContent = filtered.length
      ? `Showing ${filtered.length} of ${allOrders.length} work orders`
      : '';

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="state-box"><div class="icon">🔍</div><p>No work orders match the current filters.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(wo => {
      const overdue = isOverdue(wo);
      const priNorm = normalise(wo.priority);
      const stCls   = statusClass(wo.status);
      const dueCls  = overdue ? 'td-due overdue' : 'td-due';
      const rowCls  = [overdue ? 'is-overdue' : '', selectedId === wo.id ? 'selected' : ''].join(' ').trim();

      return `<tr class="${rowCls}" data-id="${wo.id}">
        <td class="td-title">
          ${escHtml(wo.title || '—')}
          ${overdue ? '<span class="overdue-badge">OVERDUE</span>' : ''}
          ${(signalsByWoId[wo.id] || []).length ? `<span class="signal-badge">&#9679; ${signalsByWoId[wo.id].length}</span>` : ''}
        </td>
        <td><span class="status ${stCls}">${escHtml(wo.status || '—')}</span></td>
        <td><span class="priority ${priNorm}">${escHtml(wo.priority || '—')}</span></td>
        <td>${escHtml(wo.assetName || '—')}</td>
        <td>${escHtml(wo.severity || '—')}</td>
        <td>${escHtml(wo.locationName || '—')}</td>
        <td class="${dueCls}">${fmtDate(wo.dueDate)}</td>
      </tr>`;
    }).join('');

    tbody.querySelectorAll('tr[data-id]').forEach(row => {
      row.addEventListener('click', () => openPanel(row.dataset.id));
    });
  }

  // ── Detail Panel ──────────────────────────────────────────

  function obsListHtml(woId) {
    const list = signalsByWoId[woId] || [];
    if (!list.length) return '<p style="color:var(--muted);font-size:13px">No observations yet.</p>';
    return list.map(s =>
      `<div class="obs-item"><div>${escHtml(s.text)}</div><div class="obs-time">${new Date(s.createdAt).toLocaleString()}</div></div>`
    ).join('');
  }

  function openPanel(id) {
    const wo = allOrders.find(w => w.id === id);
    if (!wo) return;
    selectedId = id;
    renderTable();

    const overdue = isOverdue(wo);
    const priNorm = normalise(wo.priority);
    const stCls   = statusClass(wo.status);

    document.getElementById('panel-content').innerHTML = `
      <div class="panel-title">${escHtml(wo.title || 'Work Order')}</div>
      <div class="panel-badges">
        <span class="status ${stCls}">${escHtml(wo.status || '—')}</span>
        <span class="priority ${priNorm}">${escHtml(wo.priority || '—')}</span>
        ${overdue ? '<span class="priority CRITICAL">OVERDUE</span>' : ''}
      </div>

      <div class="detail-section">
        <h3>Work Order</h3>
        <div class="detail-row"><span class="dk">ID</span><span class="dv">${escHtml(wo.id)}</span></div>
        <div class="detail-row"><span class="dk">Severity</span><span class="dv">${escHtml(wo.severity || '—')}</span></div>
        <div class="detail-row"><span class="dk">Due Date</span><span class="dv ${overdue ? 'red' : ''}">${fmtDate(wo.dueDate)}</span></div>
        <div class="detail-row"><span class="dk">Description</span><span class="dv">${escHtml(wo.description || '—')}</span></div>
      </div>

      <div class="detail-section">
        <h3>Asset</h3>
        <div class="detail-row"><span class="dk">Name</span><span class="dv">${escHtml(wo.assetName || '—')}</span></div>
        <div class="detail-row"><span class="dk">Description</span><span class="dv">${escHtml(wo.assetDescription || '—')}</span></div>
        <div class="detail-row"><span class="dk">Asset ID</span><span class="dv">${escHtml(wo.assetId || '—')}</span></div>
      </div>

      <div class="detail-section">
        <h3>Location</h3>
        <div class="detail-row"><span class="dk">Name</span><span class="dv">${escHtml(wo.locationName || '—')}</span></div>
        <div class="detail-row"><span class="dk">Address</span><span class="dv">${escHtml(wo.locationAddress || '—')}</span></div>
      </div>

      <div class="detail-section">
        <h3>Field Observations</h3>
        <div class="obs-list" id="obs-list"></div>
        <div class="obs-form">
          <input class="obs-input" id="obs-input" type="text" maxlength="200"
                 placeholder="Add observation (max 200 chars)…" autocomplete="off" />
          <button class="obs-btn" id="obs-btn">Add</button>
        </div>
        <div class="obs-error" id="obs-error"></div>
      </div>
    `;

    document.getElementById('obs-list').innerHTML = obsListHtml(wo.id);
    document.getElementById('detail-overlay').classList.add('open');

    const input  = document.getElementById('obs-input');
    const btn    = document.getElementById('obs-btn');
    const errEl  = document.getElementById('obs-error');
    btn.addEventListener('click', () => submitSignal(wo.id, input, btn, errEl));
    input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  }

  async function submitSignal(workOrderId, input, btn, errEl) {
    const text = input.value.trim();
    errEl.textContent = '';
    if (!text) { errEl.textContent = 'Observation cannot be empty.'; return; }

    btn.disabled = true;
    try {
      const res = await fetch('/api/signals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, workOrderId }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Failed to save.'; return; }

      allSignals.push(data.signal);
      buildSignalMap();
      input.value = '';

      const list = document.getElementById('obs-list');
      if (list) list.innerHTML = obsListHtml(workOrderId);

      renderTable(); // refreshes signal badge on the row without closing panel
    } catch (_) {
      errEl.textContent = 'Network error — try again.';
    } finally {
      btn.disabled = false;
    }
  }

  function closePanel() {
    selectedId = null;
    document.getElementById('detail-overlay').classList.remove('open');
    renderTable();
  }

  // ── XSS guard ─────────────────────────────────────────────

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Fetch ─────────────────────────────────────────────────

  async function loadWorkOrders() {
    try {
      const res = await fetch('/api/work-orders');
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const data = await res.json();
      allOrders = data.map(normalizeWorkOrder);
      await loadSignals();

      updateCounters(allOrders);
      populateFilters(allOrders);
      renderTable();

      const now = new Date();
      document.getElementById('last-updated').textContent =
        `Updated ${now.toLocaleTimeString()}`;
    } catch (err) {
      document.getElementById('wo-tbody').innerHTML = `
        <tr><td colspan="7"><div class="state-box error">
          <div class="icon">⚠️</div>
          <p>${escHtml(err.message)}</p>
        </div></td></tr>`;
    }
  }

  // ── Event wiring ──────────────────────────────────────────

  document.getElementById('filter-status').addEventListener('change', renderTable);
  document.getElementById('filter-priority').addEventListener('change', renderTable);
  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-priority').value = '';
    renderTable();
  });
  document.getElementById('close-panel').addEventListener('click', closePanel);
  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-overlay')) closePanel();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanel();
  });

  loadWorkOrders();
</script>
</body>
</html>
